<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家后台 - 首页</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#E3F2FD;font-family:微软雅黑;padding-bottom:70px;}
    .top-bar{position:fixed;top:0;left:0;right:0;background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;box-shadow:0 1px 4px #d1e7ff;}
    .logo{font-size:18px;font-weight:bold;color:#42A5F5;}
    .user-info{display:flex;align-items:center;gap:15px;}
    .user-name{font-size:14px;color:#333;}
    .logout-btn{background:#ff6b6b;color:#fff;border:none;padding:5px 15px;border-radius:20px;cursor:pointer;}
    .notification-icon{position:relative;cursor:pointer;font-size:20px;text-decoration:none;}
    .unread-badge{position:absolute;top:-8px;right:-12px;background:#ef4444;color:#fff;border-radius:50%;padding:2px 6px;font-size:10px;min-width:18px;text-align:center;}

    /* 统计卡片区域 */
    .stats-row{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      padding:75px 15px 10px;
    }
    .stat-card{
      background:#fff;
      border-radius:12px;
      padding:15px 10px;
      text-align:center;
      box-shadow:0 1px 4px #d1e7ff;
    }
    .stat-value{
      font-size:24px;
      font-weight:bold;
      color:#42A5F5;
    }
    .stat-label{
      font-size:11px;
      color:#999;
      margin-top:5px;
    }
    .stat-icon{
      font-size:20px;
      margin-bottom:5px;
    }

    /* 功能卡片区域 */
    .dashboard{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      padding:0 15px 15px;
    }
    .card{
      background:#fff;
      border-radius:12px;
      padding:20px;
      text-align:center;
      cursor:pointer;
      transition:transform 0.2s;
      box-shadow:0 1px 4px #d1e7ff;
    }
    .card:hover{transform:translateY(-3px);}
    .card-icon{font-size:36px;margin-bottom:8px;}
    .card-title{font-size:14px;font-weight:bold;color:#333;}
    .card-desc{font-size:11px;color:#999;margin-top:4px;}

    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;background:#fff;
      display:flex;padding:8px 0;border-top:1px solid #E0E0E0;
    }
    .nav-item{
      flex:1;text-align:center;font-size:12px;
      color:#666;cursor:pointer;
    }
    .nav-item.active{color:#42A5F5;font-weight:bold;}
  </style>
</head>
<body>

<div class="top-bar">
  <div class="logo">🏪 商家后台</div>
  <div class="user-info">
    <span class="user-name" id="userName">加载中...</span>
    <a href="notification.html" class="notification-icon">🔔<span id="unreadBadge" class="unread-badge" style="display:none;">0</span></a>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
</div>

<!-- 统计卡片区域 -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-icon">📦</div>
    <div class="stat-value" id="statProducts">-</div>
    <div class="stat-label">商品总数</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">📋</div>
    <div class="stat-value" id="statOrders">-</div>
    <div class="stat-label">订单总数</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">🚚</div>
    <div class="stat-value" id="statPending">-</div>
    <div class="stat-label">待发货</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon">💰</div>
    <div class="stat-value" id="statSales">-</div>
    <div class="stat-label">总销售额</div>
  </div>
</div>

<!-- 功能卡片区域 -->
<div class="dashboard">
  <div class="card" onclick="location.href='product.html'">
    <div class="card-icon">📦</div>
    <div class="card-title">商品管理</div>
    <div class="card-desc">发布、编辑、上下架商品</div>
  </div>
  <div class="card" onclick="location.href='order.html'">
    <div class="card-icon">📋</div>
    <div class="card-title">订单管理</div>
    <div class="card-desc">查看订单、确认发货</div>
  </div>
  <div class="card" onclick="location.href='afterSale.html'">
    <div class="card-icon">🔧</div>
    <div class="card-title">售后管理</div>
    <div class="card-desc">处理退款申请</div>
  </div>
  <div class="card" onclick="location.href='review.html'">
    <div class="card-icon">💬</div>
    <div class="card-title">评论管理</div>
    <div class="card-desc">回复、删除评论</div>
  </div>
  <div class="card" onclick="location.href='logistics.html'">
    <div class="card-icon">🚚</div>
    <div class="card-title">物流管理</div>
    <div class="card-desc">发货、更新物流</div>
  </div>
  <div class="card" onclick="location.href='statistics.html'">
    <div class="card-icon">📊</div>
    <div class="card-title">数据统计</div>
    <div class="card-desc">销售趋势、热销商品</div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="location.href='index.html'">首页</div>
  <div class="nav-item" onclick="location.href='product.html'">商品</div>
  <div class="nav-item" onclick="location.href='order.html'">订单</div>
  <div class="nav-item" onclick="location.href='afterSale.html'">售后</div>
  <div class="nav-item" onclick="location.href='statistics.html'">统计</div>
</div>

<script>
  const baseUrl = "http://localhost:8088/api";
  let merchantId = null;

  window.onload = function() {
    const userId = localStorage.getItem('userId');
    const userRole = localStorage.getItem('userRole');
    const username = localStorage.getItem('username');

    if (!userId) {
      window.location.href = '../login.html';
      return;
    }
    if (userRole !== 'merchant') {
      window.location.href = '../user/index.html';
      return;
    }
    merchantId = parseInt(userId);
    document.getElementById('userName').innerText = username || '商家';

    loadStatistics();
    loadUnreadCount();
  };

  function logout() {
    localStorage.clear();
    window.location.href = '../login.html';
  }

  async function loadStatistics() {
    try {
      const productRes = await axios.get(`${baseUrl}/product/list?merchantId=${merchantId}`);
      const productCount = productRes.data.data?.length || 0;
      document.getElementById('statProducts').innerText = productCount;

      const orderRes = await axios.get(`${baseUrl}/order/listAll`, {
        params: { merchantId: merchantId }
      });
      const allOrders = orderRes.data.data || [];
      const orderCount = allOrders.length;
      const pendingCount = allOrders.filter(o => o.status === 1).length;

      let totalSales = 0;
      for (let o of allOrders) {
        if (o.status === 2 || o.status === 3) {
          totalSales += o.totalPrice || 0;
        }
      }

      document.getElementById('statOrders').innerText = orderCount;
      document.getElementById('statPending').innerText = pendingCount;
      document.getElementById('statSales').innerText = '¥' + totalSales.toFixed(2);
    } catch (err) {
      console.error('加载统计数据失败:', err);
      document.getElementById('statProducts').innerText = '0';
      document.getElementById('statOrders').innerText = '0';
      document.getElementById('statPending').innerText = '0';
      document.getElementById('statSales').innerText = '¥0';
    }
  }

  async function loadUnreadCount() {
    try {
      const res = await axios.get(`${baseUrl}/notification/unreadCount?userId=${merchantId}`);
      if (res.data.code === 0) {
        const count = res.data.data || 0;
        const badge = document.getElementById('unreadBadge');
        if (count > 0) {
          badge.innerText = count > 99 ? '99+' : count;
          badge.style.display = 'block';
        } else {
          badge.style.display = 'none';
        }
      }
    } catch(err) {
      console.error('获取未读数量失败:', err);
    }
  }
</script>
</body>
</html>
