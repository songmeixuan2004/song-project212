<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺数据统计 - 商家后台</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#E3F2FD;font-family:'微软雅黑',sans-serif;padding-bottom:70px;}

    .top-bar{position:fixed;top:0;left:0;right:0;background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;box-shadow:0 1px 4px #d1e7ff;}
    .logo{font-size:18px;font-weight:bold;color:#42A5F5;}
    .user-info{display:flex;align-items:center;gap:15px;}
    .user-name{font-size:14px;color:#333;}
    .logout-btn{background:#ff6b6b;color:#fff;border:none;padding:5px 15px;border-radius:20px;cursor:pointer;}
    .back-btn{background:#42A5F5;color:#fff;border:none;padding:5px 15px;border-radius:20px;cursor:pointer;}

    .stats-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:15px;
      padding:80px 15px 15px;
    }
    .stat-card{
      background:#fff;
      border-radius:12px;
      padding:20px;
      text-align:center;
      box-shadow:0 1px 4px #d1e7ff;
    }
    .stat-value{font-size:28px;font-weight:bold;color:#42A5F5;}
    .stat-label{font-size:13px;color:#666;margin-top:5px;}

    .chart-container{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      padding:0 15px 15px;
    }
    .chart-box{
      background:#fff;
      border-radius:12px;
      padding:15px;
      box-shadow:0 1px 4px #d1e7ff;
      min-height:320px;
    }
    .chart-title{
      font-size:16px;
      font-weight:bold;
      margin-bottom:15px;
      padding-bottom:8px;
      border-bottom:1px solid #eee;
    }
    canvas{max-height:250px;width:100%;}

    .sales-list{
      background:#fff;
      border-radius:12px;
      margin:15px;
      padding:15px;
      box-shadow:0 1px 4px #d1e7ff;
    }
    .section-title{
      font-size:16px;
      font-weight:bold;
      margin-bottom:15px;
      padding-bottom:8px;
      border-bottom:1px solid #eee;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:10px;
    }
    .date-filter{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .date-filter input{
      padding:5px 10px;
      border:1px solid #ddd;
      border-radius:6px;
    }
    .filter-btn{
      background:#42A5F5;
      color:#fff;
      border:none;
      padding:5px 12px;
      border-radius:6px;
      cursor:pointer;
    }
    .order-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 0;
      border-bottom:1px solid #f0f0f0;
      cursor:pointer;
    }
    .order-item:hover{background:#f9f9f9;}
    .order-info{flex:1;}
    .order-id{font-weight:bold;color:#333;}
    .order-time{font-size:12px;color:#999;margin-top:4px;}
    .order-amount{color:#ff4d4f;font-weight:bold;font-size:16px;}
    .order-status{font-size:12px;padding:2px 8px;border-radius:12px;margin-left:10px;}
    .status-completed{background:#E8F5E9;color:#4CAF50;}
    .status-shipped{background:#E3F2FD;color:#2196F3;}
    .status-pending{background:#FFF3E0;color:#FF9800;}

    .hot-products{
      background:#fff;
      border-radius:12px;
      margin:15px;
      padding:15px;
      box-shadow:0 1px 4px #d1e7ff;
    }
    .hot-item{
      display:flex;
      align-items:center;
      padding:10px 0;
      border-bottom:1px solid #f0f0f0;
    }
    .hot-rank{
      width:40px;
      font-size:18px;
      font-weight:bold;
      color:#42A5F5;
    }
    .rank-1{color:#ff4d4f;}
    .rank-2{color:#FF9800;}
    .rank-3{color:#42A5F5;}
    .hot-img{
      width:50px;
      height:50px;
      background:#f5f5f5;
      border-radius:8px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      margin-right:12px;
    }
    .hot-img img{width:100%;height:100%;object-fit:cover;}
    .hot-info{flex:1;}
    .hot-name{font-weight:bold;}
    .hot-sales{font-size:12px;color:#999;}
    .hot-total{color:#ff4d4f;font-weight:bold;}

    .loading{text-align:center;padding:40px;color:#999;}
    .empty-msg{text-align:center;padding:40px;color:#999;}

    .bottom-nav{
      position:fixed;bottom:0;left:0;right:0;background:#fff;
      display:flex;padding:8px 0;border-top:1px solid #E0E0E0;
    }
    .nav-item{
      flex:1;text-align:center;font-size:12px;
      color:#666;cursor:pointer;
    }
    .nav-item.active{color:#42A5F5;font-weight:bold;}

    .modal{
      position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,0.5);z-index:1000;
      display:flex;align-items:center;justify-content:center;
    }
    .modal-content{
      background:#fff;border-radius:12px;
      width:90%;max-width:500px;max-height:80vh;
      overflow-y:auto;padding:20px;
    }
    .modal-title{
      font-size:18px;font-weight:bold;
      margin-bottom:15px;padding-bottom:10px;
      border-bottom:1px solid #eee;
    }
    .detail-item{
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #f0f0f0;
    }
    .close-modal{
      background:#42A5F5;
      color:#fff;
      border:none;
      padding:8px 20px;
      border-radius:6px;
      cursor:pointer;
      margin-top:15px;
      width:100%;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="logo">📊 店铺数据统计</div>
  <div class="user-info">
    <span class="user-name" id="userName">商家</span>
    <button class="back-btn" onclick="goTo('index.html')">返回首页</button>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-value" id="totalOrders">-</div>
    <div class="stat-label">总订单数</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="totalSales">-</div>
    <div class="stat-label">总销售额</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="totalProducts">-</div>
    <div class="stat-label">商品总数</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="totalCustomers">-</div>
    <div class="stat-label">客户数</div>
  </div>
</div>

<div class="chart-container">
  <div class="chart-box">
    <div class="chart-title">📈 近7天销售趋势</div>
    <canvas id="salesTrendChart" style="width:100%;height:250px;"></canvas>
  </div>
  <div class="chart-box">
    <div class="chart-title">🏆 热销商品排行</div>
    <canvas id="hotProductsChart" style="width:100%;height:250px;"></canvas>
  </div>
</div>

<div class="sales-list">
  <div class="section-title">
    <span>📋 成交明细</span>
    <div class="date-filter">
      <input type="date" id="startDate">
      <span>-</span>
      <input type="date" id="endDate">
      <button class="filter-btn" onclick="filterOrders()">筛选</button>
      <button class="filter-btn" onclick="resetFilter()">重置</button>
    </div>
  </div>
  <div id="orderList">加载中...</div>
</div>

<div class="hot-products">
  <div class="section-title">🔥 热销商品 TOP10</div>
  <div id="hotProductList">加载中...</div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="goTo('index.html')">🏠 首页</div>
  <div class="nav-item" onclick="goTo('product.html')">📦 商品</div>
  <div class="nav-item" onclick="goTo('order.html')">📋 订单</div>
  <div class="nav-item active" onclick="goTo('statistics.html')">📊 统计</div>
</div>

<script>
  const baseUrl = "http://localhost:8088/api";
  let merchantId = null;
  let allOrders = [];
  let salesTrendChart = null;
  let hotProductsChart = null;

  window.onload = function() {
    checkLogin();
  };

  function goTo(page) {
    window.location.href = page;
  }

  function checkLogin() {
    const userId = localStorage.getItem('userId');
    const userRole = localStorage.getItem('userRole');
    const username = localStorage.getItem('username');

    if (!userId) {
      window.location.href = '../../login.html';
      return;
    }
    if (userRole !== 'merchant') {
      window.location.href = '../../user/index.html';
      return;
    }
    merchantId = parseInt(userId);
    document.getElementById('userName').innerText = username || '商家';
    loadAllData();
  }

  function logout() {
    localStorage.clear();
    window.location.href = '../../login.html';
  }

  async function loadAllData() {
    await loadStatistics();
    await loadHotProducts();
  }

  async function loadStatistics() {
    try {
      // 1. 获取商品数量（商家自己的商品）
      const productRes = await axios.get(baseUrl + '/product/list?merchantId=' + merchantId);
      const products = productRes.data.data || [];
      document.getElementById('totalProducts').innerText = products.length;

      // 2. ✅ 修改：获取订单数据时传入商家ID，只查询自己的订单
      const orderRes = await axios.get(baseUrl + '/order/listAll', {
        params: { merchantId: merchantId }
      });
      const orders = orderRes.data.data || [];

      let totalSales = 0;
      let customers = new Set();

      for (let o of orders) {
        // 只统计已发货和已完成的订单
        if (o.status === 2 || o.status === 3) {
          totalSales += o.totalPrice || 0;
        }
        if (o.userId) customers.add(o.userId);
      }

      allOrders = orders;
      document.getElementById('totalOrders').innerText = orders.length;
      document.getElementById('totalSales').innerText = '¥' + totalSales.toFixed(2);
      document.getElementById('totalCustomers').innerText = customers.size;

      renderOrderList(orders);
      loadSalesTrend(orders);

      console.log('统计数据:', {
        商品数: products.length,
        订单数: orders.length,
        客户数: customers.size,
        销售额: totalSales
      });

    } catch(err) {
      console.error('加载统计数据失败:', err);
    }
  }

  function renderOrderList(orders) {
    const wrap = document.getElementById('orderList');
    if (orders.length === 0) {
      wrap.innerHTML = '<div class="empty-msg">暂无成交记录</div>';
      return;
    }

    let html = '';
    for (let o of orders) {
      let statusText = '';
      let statusClass = '';
      if (o.status === 0) { statusText = '待付款'; statusClass = 'status-pending'; }
      else if (o.status === 1) { statusText = '待发货'; statusClass = 'status-pending'; }
      else if (o.status === 2) { statusText = '已发货'; statusClass = 'status-shipped'; }
      else { statusText = '已完成'; statusClass = 'status-completed'; }

      html += `
        <div class="order-item" onclick="showOrderDetail(${o.id})">
          <div class="order-info">
            <div class="order-id">订单号：${o.id}</div>
            <div class="order-time">${formatDateTime(o.createTime)}</div>
          </div>
          <div>
            <span class="order-status ${statusClass}">${statusText}</span>
            <span class="order-amount">¥${(o.totalPrice || 0).toFixed(2)}</span>
          </div>
        </div>
      `;
    }
    wrap.innerHTML = html;
  }

  function filterOrders() {
    let startDate = document.getElementById('startDate').value;
    let endDate = document.getElementById('endDate').value;

    let filtered = [...allOrders];
    if (startDate) {
      filtered = filtered.filter(o => o.createTime && o.createTime.split('T')[0] >= startDate);
    }
    if (endDate) {
      filtered = filtered.filter(o => o.createTime && o.createTime.split('T')[0] <= endDate);
    }
    renderOrderList(filtered);
  }

  function resetFilter() {
    document.getElementById('startDate').value = '';
    document.getElementById('endDate').value = '';
    renderOrderList(allOrders);
  }

  async function showOrderDetail(orderId) {
    try {
      const itemsRes = await axios.get(baseUrl + '/order/items?orderId=' + orderId);
      const items = itemsRes.data.data || [];

      let itemsHtml = '';
      let total = 0;
      for (let item of items) {
        let subtotal = (item.productPrice || 0) * (item.quantity || 1);
        total += subtotal;
        itemsHtml += `
          <div class="detail-item">
            <span>${escapeHtml(item.productName || '商品')}</span>
            <span>¥${(item.productPrice || 0).toFixed(2)} × ${item.quantity || 1}</span>
            <span>¥${subtotal.toFixed(2)}</span>
          </div>
        `;
      }

      const modalHtml = `
        <div id="detailModal" class="modal">
          <div class="modal-content">
            <div class="modal-title">订单详情 - 订单号：${orderId}</div>
            ${itemsHtml}
            <div style="text-align:right;margin-top:10px;font-weight:bold;">总计：¥${total.toFixed(2)}</div>
            <button class="close-modal" onclick="closeModal()">关闭</button>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
    } catch(err) {
      alert('获取订单详情失败');
    }
  }

  function closeModal() {
    const modal = document.querySelector('.modal');
    if (modal) modal.remove();
  }

  function loadSalesTrend(orders) {
    const last7Days = getLast7Days();
    const salesByDate = {};
    for (let day of last7Days) salesByDate[day] = 0;

    for (let o of orders) {
      if (o.createTime && (o.status === 2 || o.status === 3)) {
        const date = o.createTime.split('T')[0];
        if (salesByDate[date] !== undefined) {
          salesByDate[date] += o.totalPrice || 0;
        }
      }
    }

    const salesData = last7Days.map(day => salesByDate[day]);

    if (salesTrendChart) salesTrendChart.destroy();
    const ctx = document.getElementById('salesTrendChart').getContext('2d');
    salesTrendChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: last7Days,
        datasets: [{
          label: '销售额 (¥)',
          data: salesData,
          borderColor: '#42A5F5',
          backgroundColor: 'rgba(66,165,245,0.1)',
          tension: 0.3,
          fill: true
        }]
      },
      options: { responsive: true, maintainAspectRatio: true }
    });
  }

  async function loadHotProducts() {
    const listWrap = document.getElementById('hotProductList');
    listWrap.innerHTML = '<div class="loading">加载中...</div>';

    try {
      const productRes = await axios.get(baseUrl + '/product/list?merchantId=' + merchantId);
      const products = productRes.data.data || [];

      // ✅ 修改：只查询自己的订单
      const orderRes = await axios.get(baseUrl + '/order/listAll', {
        params: { merchantId: merchantId }
      });
      const orders = orderRes.data.data || [];

      const productSales = {};
      for (let p of products) {
        productSales[p.id] = { name: p.name, pic: p.pic, sales: 0, revenue: 0 };
      }

      for (let o of orders) {
        if (o.status === 2 || o.status === 3) {
          try {
            const itemsRes = await axios.get(baseUrl + '/order/items?orderId=' + o.id);
            const items = itemsRes.data.data || [];
            for (let item of items) {
              if (productSales[item.productId]) {
                productSales[item.productId].sales += item.quantity || 1;
                productSales[item.productId].revenue += (item.productPrice || 0) * (item.quantity || 1);
              }
            }
          } catch(e) {}
        }
      }

      const sorted = Object.values(productSales)
              .filter(p => p.sales > 0)
              .sort((a, b) => b.sales - a.sales)
              .slice(0, 10);

      console.log('热销商品数据:', sorted);

      if (sorted.length === 0) {
        listWrap.innerHTML = '<div class="empty-msg">暂无销售数据，请先完成订单</div>';
        if (hotProductsChart) hotProductsChart.destroy();
        return;
      }

      let listHtml = '';
      for (let i = 0; i < sorted.length; i++) {
        const p = sorted[i];
        let rankClass = '';
        if (i === 0) rankClass = 'rank-1';
        else if (i === 1) rankClass = 'rank-2';
        else if (i === 2) rankClass = 'rank-3';

        listHtml += `
          <div class="hot-item">
            <div class="hot-rank ${rankClass}">${i + 1}</div>
            <div class="hot-img">${p.pic ? '<img src="' + p.pic + '">' : '<span>📦</span>'}</div>
            <div class="hot-info">
              <div class="hot-name">${escapeHtml(p.name)}</div>
              <div class="hot-sales">销量: ${p.sales}件</div>
            </div>
            <div class="hot-total">¥${p.revenue.toFixed(2)}</div>
          </div>
        `;
      }
      listWrap.innerHTML = listHtml;

      const chartLabels = sorted.slice(0, 5).map(p => p.name.length > 10 ? p.name.substring(0, 10) + '...' : p.name);
      const chartData = sorted.slice(0, 5).map(p => p.sales);

      const canvas = document.getElementById('hotProductsChart');
      if (!canvas) {
        console.error('找不到 hotProductsChart canvas 元素');
        return;
      }

      const ctx = canvas.getContext('2d');
      if (hotProductsChart) hotProductsChart.destroy();

      hotProductsChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: chartLabels,
          datasets: [{
            label: '销量 (件)',
            data: chartData,
            backgroundColor: ['#ff4d4f', '#FF9800', '#42A5F5', '#4CAF50', '#9C27B0'],
            borderRadius: 8,
            barPercentage: 0.6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return '销量: ' + context.raw + ' 件';
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              title: { display: true, text: '销量 (件)' }
            },
            x: {
              title: { display: true, text: '商品名称' }
            }
          }
        }
      });

      console.log('热销商品图表已更新，商品数量:', sorted.length);

    } catch(err) {
      console.error('加载热销商品失败:', err);
      listWrap.innerHTML = '<div class="empty-msg">加载失败：' + err.message + '</div>';
    }
  }

  function getLast7Days() {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const date = new Date();
      date.setDate(date.getDate() - i);
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      days.push(`${year}-${month}-${day}`);
    }
    return days;
  }

  function formatDateTime(dateStr) {
    if (!dateStr) return '未知';
    return dateStr.replace('T', ' ');
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);
  }
</script>
</body>
</html>
