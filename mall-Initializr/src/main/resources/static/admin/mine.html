<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 平台管理员</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#E3F2FD;font-family:'微软雅黑',sans-serif;padding-bottom:70px;}
    .top-bar{position:fixed;top:0;left:0;right:0;background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;box-shadow:0 1px 4px #d1e7ff;}
    .logo{font-size:18px;font-weight:bold;color:#42A5F5;}
    .user-info{display:flex;align-items:center;gap:15px;}
    .user-name{font-size:14px;color:#333;}
    .logout-btn{background:#ff6b6b;color:#fff;border:none;padding:5px 15px;border-radius:20px;cursor:pointer;}
    .back-btn{background:#42A5F5;color:#fff;border:none;padding:5px 15px;border-radius:20px;cursor:pointer;}

    .container{padding:80px 15px 15px;}
    .info-card{background:#fff;border-radius:12px;padding:20px;margin-bottom:15px;box-shadow:0 1px 4px #d1e7ff;}
    .card-title{font-size:16px;font-weight:bold;margin-bottom:15px;padding-bottom:8px;border-bottom:1px solid #eee;}
    .info-row{display:flex;padding:10px 0;border-bottom:1px solid #f5f5f5;}
    .info-label{width:100px;color:#666;}
    .info-value{color:#333;flex:1;}
    .edit-btn{background:#42A5F5;color:#fff;border:none;padding:5px 15px;border-radius:20px;cursor:pointer;margin-top:10px;}

    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-top:15px;}
    .stat-item{text-align:center;padding:15px;background:#f9f9f9;border-radius:10px;}
    .stat-number{font-size:24px;font-weight:bold;color:#42A5F5;}
    .stat-label{font-size:12px;color:#666;margin-top:5px;}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;padding:8px 0;border-top:1px solid #E0E0E0;}
    .nav-item{flex:1;text-align:center;font-size:12px;color:#666;cursor:pointer;}
    .nav-item.active{color:#42A5F5;font-weight:bold;}

    .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;}
    .modal-content{background:#fff;border-radius:12px;width:90%;max-width:400px;padding:20px;}
    .modal-title{font-size:18px;font-weight:bold;margin-bottom:15px;}
    .modal-field{margin-bottom:15px;}
    .modal-field label{display:block;margin-bottom:5px;font-size:13px;color:#666;}
    .modal-field input{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;}
    .modal-buttons{display:flex;gap:10px;margin-top:20px;}
    .modal-buttons button{flex:1;padding:10px;border-radius:8px;cursor:pointer;border:none;}
    .btn-submit{background:#42A5F5;color:#fff;}
    .btn-cancel{background:#ccc;color:#fff;}
  </style>
</head>
<body>

<div class="top-bar">
  <div class="logo">👤 个人中心</div>
  <div class="user-info">
    <span class="user-name" id="userName">管理员</span>
    <button class="back-btn" onclick="location.href='index.html'">返回首页</button>
    <button class="logout-btn" onclick="logout()">退出</button>
  </div>
</div>

<div class="container">
  <div class="info-card">
    <div class="card-title">基本信息</div>
    <div class="info-row">
      <div class="info-label">用户名：</div>
      <div class="info-value" id="displayUsername">-</div>
    </div>
    <div class="info-row">
      <div class="info-label">角色：</div>
      <div class="info-value">平台管理员</div>
    </div>
    <div class="info-row">
      <div class="info-label">用户ID：</div>
      <div class="info-value" id="displayUserId">-</div>
    </div>
    <div class="info-row">
      <div class="info-label">手机号：</div>
      <div class="info-value" id="displayPhone">-</div>
    </div>
    <button class="edit-btn" onclick="showEditModal()">修改信息</button>
  </div>

  <div class="info-card">
    <div class="card-title">平台概况</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-number" id="totalUsers">-</div>
        <div class="stat-label">总用户数</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="totalOrders">-</div>
        <div class="stat-label">订单数</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="totalSales">-</div>
        <div class="stat-label">总销售额</div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="location.href='index.html'">首页</div>
  <div class="nav-item" onclick="location.href='statistics.html'">统计</div>
  <div class="nav-item" onclick="location.href='control.html'">管控</div>
  <div class="nav-item active">我的</div>
</div>

<script>
  const baseUrl = "http://localhost:8088/api";
  let currentUser = null;

  window.onload = function() {
    checkLogin();
    loadStats();
  };

  function checkLogin() {
    const userId = localStorage.getItem('userId');
    const userRole = localStorage.getItem('userRole');
    const username = localStorage.getItem('username');

    if (!userId) {
      window.location.href = '../login.html';
      return;
    }
    if (userRole !== 'admin') {
      alert('权限不足');
      window.location.href = '../index.html';
      return;
    }
    document.getElementById('userName').innerText = username || '管理员';
    loadUserInfo();
  }

  async function loadUserInfo() {
    const userId = localStorage.getItem('userId');
    try {
      const res = await axios.get(baseUrl + '/user/info/' + userId);
      if (res.data.code === 0) {
        currentUser = res.data.data;
        document.getElementById('displayUsername').innerText = currentUser.username || '-';
        document.getElementById('displayUserId').innerText = currentUser.id || '-';
        document.getElementById('displayPhone').innerText = currentUser.phone || '未设置';
      }
    } catch(err) {
      console.error('加载用户信息失败:', err);
    }
  }

  async function loadStats() {
    try {
      const res = await axios.get(baseUrl + '/admin/stat');
      if (res.data.code === 0) {
        const data = res.data.data;
        document.getElementById('totalUsers').innerText = data.userCount || '-';
        document.getElementById('totalOrders').innerText = data.orderCount || '-';
        document.getElementById('totalSales').innerText = '¥' + (data.totalSales || 0).toFixed(2);
      }
    } catch(err) {
      console.error('加载统计数据失败:', err);
    }
  }

  function showEditModal() {
    const modalHtml = `
            <div id="editModal" class="modal">
                <div class="modal-content">
                    <div class="modal-title">修改信息</div>
                    <div class="modal-field">
                        <label>手机号</label>
                        <input type="tel" id="editPhone" value="${currentUser?.phone || ''}" placeholder="请输入手机号">
                    </div>
                    <div class="modal-buttons">
                        <button class="btn-submit" onclick="updateUserInfo()">保存</button>
                        <button class="btn-cancel" onclick="closeModal()">取消</button>
                    </div>
                </div>
            </div>
        `;
    document.body.insertAdjacentHTML('beforeend', modalHtml);
  }

  async function updateUserInfo() {
    const phone = document.getElementById('editPhone').value.trim();
    if (!phone) {
      alert('请填写手机号');
      return;
    }
    try {
      const res = await axios.put(baseUrl + '/user/update', {
        id: currentUser.id,
        phone: phone
      });
      if (res.data.code === 0 || res.data.code === 1) {
        alert('修改成功');
        closeModal();
        loadUserInfo();
      } else {
        alert('修改失败：' + res.data.msg);
      }
    } catch(err) {
      alert('修改失败');
    }
  }

  function closeModal() {
    const modal = document.querySelector('.modal');
    if (modal) modal.remove();
  }

  function logout() {
    localStorage.clear();
    window.location.href = '../login.html';
  }
</script>
</body>
</html>
